name: Telecom RAG CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ============================================================================
  # STAGE 1: Code Quality, Security, and Testing Guards
  # ============================================================================
  quality-and-test:
    name: Lint, Scan, and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Env
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Leverages GitHub caching to maximize package restore speeds

      - name: Install Development Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Code Style Check (Black)
        run: black --check src/ tests/ config/

      - name: Import Hierarchy Sorting Check (isort)
        run: isort --check-only src/ tests/ config/

      - name: Static Security Scan (Bandit)
        run: bandit -r src/ -ll

      - name: Run Test Suites (Pytest)
        env:
          # Inject dummy variables to satisfy Pydantic Settings boot checking boundaries
          GEMINI_API_KEY: "AIzaSyFakeKeyForTestingBoundariesOnly123"
          DB_CONNECTION_STRING: "postgresql://mock_user:mock_pass@localhost:5432/mock_db"
        run: |
          pytest tests/ -v --asyncio-mode=auto

  # ============================================================================
  # STAGE 2: Build and Publish Production Docker Container
  # ============================================================================
  build-and-publish:
    name: Build and Push to GHCR
    needs: quality-and-test
    # Only publish image artifacts if the commits hit the main deployable branches
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx Compiler
        uses: actions/setup-buildx-action@v3

      - name: Authenticate to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Container Metadata Semantic Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/telecom-api
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=ref,event=branch
            uses=true,pattern=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Compile and Push Multi-Stage Image Artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Accelerates re-build performance via GitHub Actions native layer caching
          cache-to: type=gha,mode=max

  # ============================================================================
  # STAGE 3: Autonomous Deployment Verification (CD Pipeline Trigger Stub)
  # ============================================================================
  continuous-deployment:
    name: Trigger GitOps Target Deployment
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Notify GitOps Controller (ArgoCD / Flux)
        run: |
          echo "Image successfully delivered to Registry. Initiating manifest update signal for tag: sha-${{ github.sha }}"
          # In a full GitOps setup, add steps to commit the updated image SHA 
          # directly into your separate Kubernetes Helm or Kustomize repository.
